<!DOCTYPE html>
<html>
<head>
    <title>Fetch Demo</title>
</head>
<body>

<button onclick="getData()">Get Data</button>

<div id="output"></div>

<script>
function getData()
{
    fetch("https://jsonplaceholder.typicode.com/todos/1")
    .then(response => response.json())
    .then(data =>
    {
        document.getElementById("output").innerText =
            data.title;
    });
}
</script>

</body>
</html>
