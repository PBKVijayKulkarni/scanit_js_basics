<html>
    <body>
<script>
    function calculate() {
        let sum = 0;

        for(let i=1; i<=100000000; i++) {
            sum += i;
        }

        document.write("Calculation Finished");
    }

    document.write("Start");

    calculate();

    document.write("End");
</script>
</body>
</html>
